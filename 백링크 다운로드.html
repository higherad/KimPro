<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>백링크 다운로드 | 김프로</title>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0f172a;
      --accent: #10b981;
      --accent2: #059669;
      --muted: #94a3b8;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background: linear-gradient(135deg, var(--navy) 0%, #1e3a5f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #download-btn {
      padding: 16px 32px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #download-btn:hover {
      background: var(--accent2);
    }

    #download-btn:disabled {
      background: var(--muted);
      cursor: not-allowed;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<button id="download-btn" type="button">백링크 다운로드</button>

<script type="module">
const API_BASE = 'https://kimpro-premium-938928195180.asia-northeast3.run.app';
const MEMO = '1test';
const MISSIONS = [2, 3, 9];

const btn = document.getElementById('download-btn');

btn.addEventListener('click', async () => {
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = '다운로드 중...';

  try {
    const res = await fetch(`${API_BASE}/merge`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ memo: MEMO, missions: MISSIONS }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `요청 실패 (${res.status})`);
    }

    const blob = await res.blob();
    const disposition = res.headers.get('Content-Disposition') || '';
    const match = disposition.match(/filename="?([^"]+)"?/);
    const filename = match ? match[1] : `백링크_통합_${new Date().toISOString().slice(0, 10)}.xlsx`;

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (e) {
    alert(`다운로드 실패: ${e.message}`);
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = original;
  }
});
</script>

</body>
</html>
